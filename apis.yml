aid: google-cloud-api-gateway
name: Google Cloud API Gateway
description: >-
  Google Cloud API Gateway enables you to provide secure access to your backend
  services through a well-defined REST API that is consistent across all of your
  services. It is a fully managed, pay-per-use gateway designed for serverless
  workloads, supporting Cloud Functions, Cloud Run, and App Engine backends. API
  Gateway includes security features like authentication and API key validation,
  as well as monitoring, logging, and tracing capabilities.
